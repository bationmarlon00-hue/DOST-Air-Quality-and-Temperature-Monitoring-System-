<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality & Temperature Monitoring System</title>
    
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>

    <style>
        :root {
            /* High-Tech Dark Mode Palette */
            --bg-deep: #050b14;
            --card-glass: rgba(13, 25, 48, 0.65);
            --border-glow: rgba(242, 169, 0, 0.3); /* DOST Gold glow */
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --dost-gold: #F2A900;
            
            /* 3-Tier Status Colors */
            --safe-green: #10b981;
            --caution-yellow: #f59e0b;
            --danger-red: #ef4444;
            --waiting-gray: #475569;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 0%, #0d1e3b 0%, #050b14 70%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Futuristic Header */
        .header {
            width: 100%;
            padding: 30px 0 20px 0;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(180deg, rgba(0, 40, 85, 0.8) 0%, rgba(5, 11, 20, 0) 100%);
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .header p {
            margin: 8px 0 20px 0;
            font-size: 13px;
            color: var(--dost-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* MASTER SYSTEM TAG */
        .master-badge {
            display: inline-block;
            padding: 8px 30px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .badge-safe { background-color: rgba(16, 185, 129, 0.1); color: var(--safe-green); border-color: var(--safe-green); }
        .badge-caution { background-color: rgba(245, 158, 11, 0.1); color: var(--caution-yellow); border-color: var(--caution-yellow); }
        .badge-danger { 
            background-color: rgba(239, 68, 68, 0.2); 
            color: #fff; 
            border-color: var(--danger-red);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            animation: pulse-danger 1.5s infinite;
        }
        .badge-waiting { background-color: rgba(71, 85, 105, 0.2); color: var(--text-muted); border-color: var(--waiting-gray); }

        @keyframes pulse-danger {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Telemetry Grid Layout */
        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 40px 20px;
            max-width: 1300px;
        }

        /* Glassmorphism HUD Cards */
        .card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid var(--waiting-gray);
            border-radius: 12px;
            width: 320px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 15px var(--border-glow);
            border-color: rgba(255,255,255,0.1);
        }

        .card-header {
            padding: 18px 0 0 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Dynamic Card Top Borders */
        .status-safe { border-top-color: var(--safe-green); }
        .status-caution { border-top-color: var(--caution-yellow); }
        .status-danger { border-top-color: var(--danger-red); }

        /* Gauge Container */
        .gauge-container {
            width: 100%;
            height: 240px;
            margin-top: -10px;
        }

        /* System Status Footer */
        .timestamp {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 40px;
            padding: 10px 25px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Air Quality Telemetry</h1>
        <p>DOST Evaluation Node • Edge Computing</p>
        
        <div id="master-status" class="master-badge badge-waiting">
            Establishing Link...
        </div>
    </div>

    <div class="dashboard-container">
        <div class="card" id="card-pm25">
            <div class="card-header">PM2.5 DUST</div>
            <div id="gauge-pm25" class="gauge-container"></div>
        </div>

        <div class="card" id="card-co2">
            <div class="card-header">TRUE CO2</div>
            <div id="gauge-co2" class="gauge-container"></div>
        </div>

        <div class="card" id="card-voc">
            <div class="card-header">VOC LEVELS</div>
            <div id="gauge-voc" class="gauge-container"></div>
        </div>

        <div class="card" id="card-temp">
            <div class="card-header">TEMPERATURE</div>
            <div id="gauge-temp" class="gauge-container"></div>
        </div>

        <div class="card" id="card-hum">
            <div class="card-header">HUMIDITY</div>
            <div id="gauge-hum" class="gauge-container"></div>
        </div>
    </div>

    <div class="timestamp" id="last-update">Connecting to secure cloud server...</div>

    <script>
        // ==========================================
        // SYSTEM CONFIGURATION
        // ==========================================
        const channelID = '3415500'; 
        
        const limits = {
            pm25: { caution: 25, danger: 35 },
            co2:  { caution: 800, danger: 1000 },
            voc:  { caution: 300, danger: 400 },
            temp: { min: 18, caution: 30, danger: 32 },
            hum:  { min: 40, caution: 65, danger: 70 }
        };

        const charts = {};

        // ==========================================
        // HIGH-TECH ECHARTS GAUGE INITIALIZATION
        // ==========================================
        function initGauge(domId, unit, min, max, colorSplits) {
            const chartDom = document.getElementById(domId);
            const myChart = echarts.init(chartDom);
            
            const option = {
                series: [
                    {
                        type: 'gauge',
                        startAngle: 200,
                        endAngle: -20,
                        min: min,
                        max: max,
                        splitNumber: 5,
                        itemStyle: {
                            color: '#F2A900', // DOST Gold Needle
                            shadowColor: 'rgba(242, 169, 0, 0.5)',
                            shadowBlur: 10
                        },
                        axisLine: {
                            lineStyle: {
                                width: 8, // Thinner, futuristic track
                                color: colorSplits
                            }
                        },
                        pointer: {
                            icon: 'path://M2.9,0.7L2.9,0.7c1.4,0,2.6,1.2,2.6,2.6l0,38c0,0.1-0.1,0.2-0.2,0.2H0.5c-0.1,0-0.2-0.1-0.2-0.2l0-38C0.3,1.9,1.4,0.7,2.9,0.7z',
                            length: '65%',
                            width: 3,
                            offsetCenter: [0, '-8%']
                        },
                        axisTick: {
                            length: 6,
                            lineStyle: { color: 'inherit', width: 1 }
                        },
                        splitLine: {
                            length: 12,
                            lineStyle: { color: 'inherit', width: 2 }
                        },
                        axisLabel: {
                            color: '#64748b',
                            fontSize: 10,
                            distance: -20,
                        },
                        title: {
                            offsetCenter: [0, '40%'],
                            fontSize: 12,
                            color: '#64748b',
                            letterSpacing: 1
                        },
                        detail: {
                            fontSize: 36,
                            offsetCenter: [0, '15%'],
                            valueAnimation: true,
                            formatter: '{value}',
                            color: '#ffffff',
                            fontWeight: '300',
                            textShadowColor: 'rgba(255,255,255,0.3)',
                            textShadowBlur: 5
                        },
                        data: [
                            { value: 0, name: unit }
                        ]
                    }
                ]
            };
            
            myChart.setOption(option);
            return myChart;
        }

        window.onload = function() {
            charts.pm25 = initGauge('gauge-pm25', 'µg/m³', 0, 50, [[0.5, '#10b981'], [0.7, '#f59e0b'], [1, '#ef4444']]);
            charts.co2 = initGauge('gauge-co2', 'ppm', 0, 2000, [[0.4, '#10b981'], [0.5, '#f59e0b'], [1, '#ef4444']]);
            charts.voc = initGauge('gauge-voc', 'Analog', 0, 500, [[0.6, '#10b981'], [0.8, '#f59e0b'], [1, '#ef4444']]);
            charts.temp = initGauge('gauge-temp', '°C', 10, 50, [[0.2, '#ef4444'], [0.5, '#10b981'], [0.55, '#f59e0b'], [1, '#ef4444']]);
            charts.hum = initGauge('gauge-hum', '% RH', 0, 100, [[0.4, '#ef4444'], [0.65, '#10b981'], [0.7, '#f59e0b'], [1, '#ef4444']]);
            
            fetchLiveData();
            setInterval(fetchLiveData, 15000);
        };

        // ==========================================
        // TELEMETRY FETCH & UPDATE LOGIC
        // ==========================================
        async function fetchLiveData() {
            const url = `https://api.thingspeak.com/channels/${channelID}/feeds/last.json`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();

                let threatLevel = 0;

                threatLevel = Math.max(threatLevel, processCard('pm25', data.field2, limits.pm25));
                threatLevel = Math.max(threatLevel, processCard('co2', data.field1, limits.co2));
                threatLevel = Math.max(threatLevel, processCard('voc', data.field3, limits.voc));
                threatLevel = Math.max(threatLevel, processCardMinMax('temp', data.field4, limits.temp));
                threatLevel = Math.max(threatLevel, processCardMinMax('hum', data.field5, limits.hum));

                updateMasterTag(threatLevel);

                const date = new Date(data.created_at);
                const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                document.getElementById('last-update').innerText = "LAST SYNC: " + timeStr + " | SYSTEM: ONLINE";
                document.getElementById('last-update').style.color = "#10b981";

            } catch (error) {
                console.error("Telemetry link severed: ", error);
                document.getElementById('last-update').innerText = "SYSTEM OFFLINE: AWAITING SENSOR DATA...";
                document.getElementById('last-update').style.color = "#f59e0b";
                updateMasterTag(-1); 
            }
        }

        // ==========================================
        // UI EVALUATION LOGIC
        // ==========================================
        function processCard(sensor, valStr, limitObj) {
            const card = document.getElementById('card-' + sensor);
            if(!valStr) return 0;
            
            const val = parseFloat(valStr).toFixed(1);
            charts[sensor].setOption({ series: [{ data: [{ value: val, name: charts[sensor].getOption().series[0].data[0].name }] }] });
            
            if(val > limitObj.danger) { card.className = 'card status-danger'; return 2; }
            else if(val > limitObj.caution) { card.className = 'card status-caution'; return 1; }
            else { card.className = 'card status-safe'; return 0; }
        }

        function processCardMinMax(sensor, valStr, limitObj) {
            const card = document.getElementById('card-' + sensor);
            if(!valStr) return 0;
            
            const val = parseFloat(valStr).toFixed(1);
            charts[sensor].setOption({ series: [{ data: [{ value: val, name: charts[sensor].getOption().series[0].data[0].name }] }] });
            
            if(val < limitObj.min || val > limitObj.danger) { card.className = 'card status-danger'; return 2; }
            else if(val > limitObj.caution) { card.className = 'card status-caution'; return 1; }
            else { card.className = 'card status-safe'; return 0; }
        }

        function updateMasterTag(level) {
            const tag = document.getElementById('master-status');
            tag.className = 'master-badge'; 

            if (level === 2) {
                tag.classList.add('badge-danger');
                tag.innerText = "CRITICAL: EVACUATE";
            } else if (level === 1) {
                tag.classList.add('badge-caution');
                tag.innerText = "WARNING: ELEVATED";
            } else if (level === 0) {
                tag.classList.add('badge-safe');
                tag.innerText = "SYSTEM NOMINAL";
            } else {
                tag.classList.add('badge-waiting');
                tag.innerText = "SENSORS OFFLINE";
            }
        }
    </script>
</body>
</html>
